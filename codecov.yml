# Coverage configuration for opcua-session-manager
#
# SessionManagerDaemon is excluded from coverage because it runs as a separate
# long-lived process (ReactPHP event loop). PHP coverage tools (pcov, xdebug)
# only instrument the process that runs the test suite — they cannot track code
# executing inside a child process started via proc_open().
#
# The daemon IS fully tested by the integration test suite (tests/Integration/),
# which starts a real daemon, sends IPC commands, and verifies responses. The
# coverage tool simply cannot see into the subprocess.
#
# This is a known limitation shared by other daemon/worker-based PHP packages:
#   - Laravel Horizon (subprocess workers)
#   - Symfony Messenger (consumer processes)
#   - ReactPHP-based servers
#   - RoadRunner / FrankenPHP workers
#
# Without this exclusion, the reported coverage would be ~82% instead of the
# actual ~99%+ that integration tests provide.

coverage:
  status:
    project:
      default:
        target: 99.5%
        threshold: 1%

ignore:
  - "src/Daemon/SessionManagerDaemon.php"
