  </text>

  <rect x="120" y="92" width="82" height="18" rx="9" fill="url(#badge1)" />
  <text x="161" y="104" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="9" font-weight="600" fill="#818CF8" text-anchor="middle" letter-spacing="1" opacity="0.7">
    PHP CLIENT
