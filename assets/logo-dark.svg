  <rect x="208" y="92" width="68" height="18" rx="9" fill="url(#brand)" />
  <text x="242" y="104" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="9" font-weight="700" fill="#0F0E1A" text-anchor="middle" letter-spacing="1">
